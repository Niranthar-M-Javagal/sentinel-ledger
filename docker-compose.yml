services:

  postgres:
    image: postgres:16
    container_name: sentinel-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sentinel_ledger

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: sentinel-redis

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend

    container_name: backend

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ./backend/.env

  fraud-worker:
    build:
      context: ./fraud-worker

    container_name: fraud-worker

    depends_on:
      - redis

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    ports:
      - "3001:3000"

volumes:
  postgres_data:

