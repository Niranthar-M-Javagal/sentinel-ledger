services:

  postgres:
    image: postgres:16
    container_name: sentinel-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sentinel_ledger

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./transaction-engine/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: sentinel-redis

    ports:
      - "6379:6379"

  transaction-engine:
    build:
      context: ./transaction-engine

    container_name: transaction-engine

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ./transaction-engine/.env

  fraud-worker:
    build:
      context: ./fraud-worker

    container_name: fraud-worker

    depends_on:
      - redis

volumes:
  postgres_data: